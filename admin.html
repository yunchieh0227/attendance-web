<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>打卡系統後台</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root {
    --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a; --border:#2e3348;
    --text:#e8eaf0; --muted:#7b82a0;
    --green:#06c755; --green-dim:#084d22;
    --red:#ff4d4d; --red-dim:#4d1515;
    --amber:#f5a623;
    --font:'Noto Sans TC',sans-serif; --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

  /* login */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:340px}
  .login-box h1{font-size:20px;font-weight:700;margin-bottom:6px}
  .login-box p{color:var(--muted);font-size:13px;margin-bottom:28px}
  .login-box input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--mono);font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s}
  .login-box input:focus{border-color:var(--green)}
  .btn-login{width:100%;background:var(--green);color:#000;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)}
  .err-msg{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-top:8px}

  /* layout */
  #app{display:none;min-height:100vh}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
  .topbar-title{font-weight:700;font-size:16px;flex:1}
  .topbar-tag{background:var(--green-dim);color:var(--green);font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px}
  .logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font);transition:all .2s}
  .logout-btn:hover{border-color:var(--red);color:var(--red)}
  .tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px;overflow-x:auto}
  .tab{padding:14px 18px;cursor:pointer;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}
  .content{padding:24px;max-width:1100px;margin:0 auto}

  /* cards */
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
  .card-title{font-size:11px;color:var(--muted);margin-bottom:14px;font-weight:500;letter-spacing:.07em;text-transform:uppercase}

  /* table */
  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{color:var(--muted);font-weight:500;text-align:left;padding:8px 8px;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap}
  .tbl td{padding:9px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr:hover td{background:var(--bg3)}

  /* badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
  .badge-green{background:var(--green-dim);color:var(--green)}
  .badge-amber{background:#3d2e0a;color:var(--amber)}
  .badge-gray{background:var(--bg3);color:var(--muted)}

  /* inputs */
  input[type=number],input[type=text],input[type=date],select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .2s}
  input:focus,select:focus{border-color:var(--green)}
  select option{background:var(--bg2)}

  .btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .2s}
  .btn:hover{opacity:.82}
  .btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
  .btn-primary{background:var(--green);color:#000}
  .btn-ghost{background:var(--bg3);color:var(--text)}
  .btn-danger{background:var(--red-dim);color:var(--red)}

  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-label{font-size:11px;color:var(--muted)}

  /* emp chips */
  .emp-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .emp-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:13px;transition:all .2s;background:var(--bg2)}
  .emp-chip.selected{border-color:var(--green);background:var(--green-dim);color:var(--green)}

  /* day buttons */
  .day-btn-group{display:flex;gap:3px}
  .day-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--font);transition:all .15s}
  .day-btn.active-full{background:var(--green-dim);border-color:var(--green);color:var(--green)}
  .day-btn.active-half{background:#2a3d1a;border-color:#8bcc5a;color:#8bcc5a}
  .day-btn.active-none{background:var(--red-dim);border-color:var(--red);color:var(--red)}

  /* overtime check button */
  .ot-check{transition:all .3s}
  .ot-check.saved{background:var(--green-dim)!important;color:var(--green)!important;border-color:var(--green)!important}

  .empty{color:var(--muted);font-size:14px;text-align:center;padding:32px 0}
  .loading{color:var(--muted);font-size:13px;padding:20px 0;text-align:center}

  /* summary total row */
  .total-row td{font-weight:700;color:var(--green);border-top:2px solid var(--border)}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:14px;z-index:100;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{border-color:var(--green);color:var(--green)}
  .toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- login -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 後台管理系統</h1>
    <p>請輸入管理員密碼進入</p>
    <input type="password" id="secret-input" placeholder="Admin Secret" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">登入</button>
    <p class="err-msg" id="login-err"></p>
  </div>
</div>

<!-- app -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">打卡系統後台</span>
    <span class="topbar-tag">已登入</span>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('employees')">員工管理</div>
    <div class="tab"        onclick="switchTab('workdays')">出工日確認</div>
    <div class="tab"        onclick="switchTab('loans')">借支管理</div>
    <div class="tab"        onclick="switchTab('salary')">薪資結算</div>
    <div class="tab"        onclick="switchTab('summary')">本期總計</div>
  </div>
  <div class="content">

    <!-- 員工管理 -->
    <div id="tab-employees">
      <div class="card">
        <div class="card-title">員工列表（修改後按儲存）</div>
        <div id="emp-list"><div class="loading">載入中...</div></div>
      </div>
    </div>

    <!-- 出工日 -->
    <div id="tab-workdays" style="display:none">
      <div class="card">
        <div class="card-title">選擇員工</div>
        <div class="emp-selector" id="wd-emp-chips"></div>
      </div>
      <div class="card" id="wd-card" style="display:none">
        <div class="card-title">出工日確認
          <span style="color:var(--muted);font-size:10px;margin-left:8px">點天數確認 ／ 加班欄填時數後按 ✓</span>
        </div>
        <div id="wd-list"></div>
      </div>
    </div>

    <!-- 借支 -->
    <div id="tab-loans" style="display:none">
      <div class="card">
        <div class="card-title">新增借支</div>
        <div class="form-row">
          <div class="form-group"><span class="form-label">員工</span><select id="loan-emp" style="width:150px"></select></div>
          <div class="form-group"><span class="form-label">借支金額</span><input type="number" id="loan-amount" style="width:130px" placeholder="0"/></div>
          <div class="form-group"><span class="form-label">備註</span><input type="text" id="loan-note" style="width:180px" placeholder="可空白"/></div>
          <button class="btn btn-primary" onclick="addLoan()">新增借支</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">借支紀錄查詢</div>
        <div class="form-row">
          <select id="loan-query-emp" style="width:160px"></select>
          <button class="btn btn-ghost" onclick="queryLoans()">查個人借支</button>
          <button class="btn btn-ghost" onclick="queryAllLoans()">全體借支紀錄</button>
        </div>
        <div id="loan-list"></div>
      </div>
    </div>

    <!-- 薪資結算 -->
    <div id="tab-salary" style="display:none">
      <div class="card">
        <div class="card-title">產生薪資結算單</div>
        <div class="form-row">
          <div class="form-group"><span class="form-label">員工</span><select id="sal-emp" style="width:150px"></select></div>
          <div class="form-group"><span class="form-label">期別</span><input type="text" id="sal-label" style="width:100px" placeholder="2025-03"/></div>
          <div class="form-group"><span class="form-label">開始日</span><input type="date" id="sal-start"/></div>
          <div class="form-group"><span class="form-label">結束日</span><input type="date" id="sal-end"/></div>
          <div class="form-group"><span class="form-label">結算日</span><input type="date" id="sal-settle"/></div>
          <div class="form-group"><span class="form-label">借支扣款</span><input type="number" id="sal-loan-ded" style="width:110px" value="0"/></div>
          <div class="form-group"><span class="form-label">備註</span><input type="text" id="sal-note" style="width:160px" placeholder="可空白"/></div>
          <button class="btn btn-primary" onclick="createSalaryPeriod()">產生結算單</button>
        </div>
        <div id="sal-result" style="font-size:14px;color:var(--muted)"></div>
      </div>
      <div class="card">
        <div class="card-title">結算單查詢</div>
        <div class="form-row">
          <div class="form-group"><span class="form-label">員工</span><select id="sal-query-emp" style="width:150px"></select></div>
          <div class="form-group"><span class="form-label">期別</span><input type="text" id="sal-query-label" style="width:110px" placeholder="空白=全部"/></div>
          <div class="form-group"><span class="form-label">狀態</span>
            <select id="sal-query-status" style="width:110px">
              <option value="">全部</option>
              <option value="draft">草稿</option>
              <option value="confirmed">已確認</option>
            </select>
          </div>
          <button class="btn btn-ghost" onclick="querySalary()">查詢</button>
        </div>
        <div id="sal-list"></div>
      </div>
    </div>

    <!-- 本期總計 -->
    <div id="tab-summary" style="display:none">
      <div class="card">
        <div class="card-title">本期總計（已確認結算單）</div>
        <div class="form-row">
          <div class="form-group">
            <span class="form-label">選擇期別</span>
            <select id="sum-label" style="width:160px" onchange="querySummary()"></select>
          </div>
          <button class="btn btn-ghost" onclick="querySummary()">查詢</button>
        </div>
        <div id="sum-list"></div>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = "https://attendance-backend-g8k9.onrender.com";
let SECRET = "";
let employees = [];
const TABS = ["employees","workdays","loans","salary","summary"];

// ── auth ──
function doLogin() {
  const s = document.getElementById("secret-input").value.trim();
  if (!s) return;
  SECRET = s;
  fetchEmployees().then(ok => {
    if (ok) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
    } else {
      document.getElementById("login-err").textContent = "密碼錯誤或連線失敗";
      SECRET = "";
    }
  });
}
function doLogout() {
  SECRET = ""; employees = [];
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("secret-input").value = "";
}

// ── tabs ──
function switchTab(name) {
  TABS.forEach(t => document.getElementById("tab-"+t).style.display = t===name?"block":"none");
  document.querySelectorAll(".tab").forEach((el,i) => el.classList.toggle("active", TABS[i]===name));
  if (name==="workdays") buildEmpChips("wd-emp-chips", loadWorkdays);
  if (name==="loans")    { buildEmpSelect("loan-emp"); buildEmpSelect("loan-query-emp"); }
  if (name==="salary")   { buildEmpSelect("sal-emp"); buildEmpSelect("sal-query-emp", true); }
  if (name==="summary")  loadSummaryLabels();
}

// ── api ──
async function api(method, path, body) {
  const opts = { method, headers: {"Content-Type":"application/json","X-Admin-Secret":SECRET} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

function toast(msg, type="success") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = "toast show "+type;
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove("show"), 3000);
}

function fmt(n) { return (n||0).toLocaleString(); }

function toHHMM(dtStr) {
  const d = new Date(dtStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── 員工 ──
async function fetchEmployees() {
  try {
    const d = await api("GET", "/api/admin/employees");
    if (!d.employees) return false;
    employees = d.employees; renderEmpTable(); return true;
  } catch { return false; }
}

function renderEmpTable() {
  const el = document.getElementById("emp-list");
  if (!employees.length) { el.innerHTML='<div class="empty">尚無員工</div>'; return; }
  el.innerHTML = `<div style="overflow-x:auto"><table class="tbl">
    <tr><th>ID</th><th>姓名</th><th>日薪</th><th>加班費/hr</th><th>勞保</th><th>健保</th><th>稅金</th><th>仲介費</th><th>狀態</th><th>操作</th></tr>
    ${employees.map(e=>`<tr>
      <td style="font-family:var(--mono);color:var(--muted);font-size:11px">${e.id}</td>
      <td style="font-weight:600">${e.display_name}</td>
      <td><input type="number" value="${e.daily_rate}"        id="dr-${e.id}" style="width:78px"/></td>
      <td><input type="number" value="${e.overtime_rate}"     id="or-${e.id}" style="width:68px"/></td>
      <td><input type="number" value="${e.labor_insurance}"   id="li-${e.id}" style="width:68px"/></td>
      <td><input type="number" value="${e.health_insurance}"  id="hi-${e.id}" style="width:68px"/></td>
      <td><input type="number" value="${e.tax||0}"            id="tx-${e.id}" style="width:68px"/></td>
      <td><input type="number" value="${e.agency_fee||0}"     id="af-${e.id}" style="width:68px"/></td>
      <td><span class="badge ${e.is_active?'badge-green':'badge-gray'}">${e.is_active?'在職':'停用'}</span></td>
      <td><div style="display:flex;gap:4px">
        <button class="btn btn-primary btn-sm" onclick="saveEmp(${e.id})">儲存</button>
        <button class="btn btn-danger btn-sm"  onclick="deleteEmp(${e.id},'${e.display_name.replace(/'/g,"\\'")}')">刪除</button>
      </div></td>
    </tr>`).join("")}
  </table></div>`;
}

async function saveEmp(id) {
  try {
    const g = k => +document.getElementById(k+"-"+id).value;
    await api("PATCH", `/api/admin/employees/${id}`, {
      daily_rate:g("dr"), overtime_rate:g("or"), labor_insurance:g("li"),
      health_insurance:g("hi"), tax:g("tx"), agency_fee:g("af"),
    });
    toast("✓ 員工設定已儲存");
    await fetchEmployees();
  } catch(e) { toast(e.message || "儲存失敗", "error"); }
}

async function deleteEmp(id, name) {
  if (!confirm(`確定要刪除員工「${name}」？\n此操作將一併刪除該員工所有打卡、出工日、借支及薪資紀錄，且無法復原。`)) return;
  try {
    await api("DELETE", `/api/admin/employees/${id}`);
    toast(`✓ 員工 ${name} 已刪除`);
    await fetchEmployees();
  } catch(e) { toast(e.message || "刪除失敗", "error"); }
}

// ── 出工日 ──
function buildEmpChips(cid, fn) {
  document.getElementById(cid).innerHTML = employees.map(e=>
    `<div class="emp-chip" onclick="selChip(this,'${cid}',${e.id},${fn.name})">${e.display_name}</div>`
  ).join("");
}
function selChip(el, cid, empId, fn) {
  document.querySelectorAll(`#${cid} .emp-chip`).forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected"); fn(empId);
}

async function loadWorkdays(empId) {
  document.getElementById("wd-card").style.display = "block";
  document.getElementById("wd-list").innerHTML = '<div class="loading">載入中...</div>';
  try {
  const [wdData, otData] = await Promise.all([
    api("GET", `/api/admin/workdays/${empId}`),
    api("GET", `/api/admin/overtime/${empId}`)
  ]);
  const rows = wdData.workdays || [];
  const otByDate = {};
  (otData.records||[]).forEach(r => { otByDate[r.work_date] = r.hours; });

  if (!rows.length) { document.getElementById("wd-list").innerHTML='<div class="empty">尚無出工日紀錄</div>'; return; }

  document.getElementById("wd-list").innerHTML = `<div style="overflow-x:auto"><table class="tbl">
    <tr><th>日期</th><th>上班</th><th>下班</th><th>時間</th><th>天數確認</th><th>加班(h)</th><th>備註</th><th>打卡位置</th></tr>
    ${rows.map(r=>{
      const cinVal  = r.clock_in_time  ? toHHMM(r.clock_in_time)  : "";
      const coutVal = r.clock_out_time ? toHHMM(r.clock_out_time) : "";
      const dv = r.day_value; const ot = otByDate[r.work_date]||0;
      const cinLink  = r.clock_in_address
        ? `<a href="https://maps.google.com/?q=${encodeURIComponent(r.clock_in_address)}"  target="_blank" style="color:var(--green);font-size:11px;text-decoration:none;flex-shrink:0">📍</a><span style="font-size:11px;color:var(--text);margin-left:3px">${r.clock_in_address}</span>`
        : '<span style="color:var(--muted);font-size:11px">—</span>';
      const coutLink = r.clock_out_address
        ? `<a href="https://maps.google.com/?q=${encodeURIComponent(r.clock_out_address)}" target="_blank" style="color:var(--amber);font-size:11px;text-decoration:none;flex-shrink:0">📍</a><span style="font-size:11px;color:var(--text);margin-left:3px">${r.clock_out_address}</span>`
        : '<span style="color:var(--muted);font-size:11px">—</span>';
      return `<tr id="wr-${r.id}">
        <td style="font-family:var(--mono);font-size:12px">${r.work_date}</td>
        <td><input type="text" id="cin-${r.id}"  value="${cinVal}"  placeholder="HH:MM" maxlength="5" style="width:68px;padding:4px 6px;font-size:12px;text-align:center;font-family:var(--mono)"/></td>
        <td><input type="text" id="cout-${r.id}" value="${coutVal}" placeholder="HH:MM" maxlength="5" style="width:68px;padding:4px 6px;font-size:12px;text-align:center;font-family:var(--mono)"/></td>
        <td><button id="ctbtn-${r.id}" class="btn btn-ghost btn-sm ot-check" onclick="saveClockTimes(${r.id})">儲存</button></td>
        <td><div class="day-btn-group">
          <button class="day-btn ${dv==1?'active-full':''}"    onclick="setDayVal(${r.id},1.0,this)">1天</button>
          <button class="day-btn ${dv==0.5?'active-half':''}"  onclick="setDayVal(${r.id},0.5,this)">半天</button>
          <button class="day-btn ${dv===0?'active-none':''}"   onclick="setDayVal(${r.id},0,this)">0天</button>
          <button class="day-btn ${dv===null?'active-none':''}" onclick="setDayVal(${r.id},null,this)">不算</button>
        </div></td>
        <td><div style="display:flex;gap:4px;align-items:center">
          <input type="number" id="ot-${r.id}" value="${ot}" step="0.5" min="0" style="width:56px;padding:4px 6px;font-size:12px"/>
          <button id="otbtn-${r.id}" class="btn btn-ghost btn-sm ot-check" onclick="saveOt(${r.id})">✓</button>
        </div></td>
        <td><input type="text" id="note-${r.id}" value="${r.note||''}" style="width:88px;font-size:12px" placeholder="備註"/></td>
        <td style="max-width:180px">
          <div style="display:flex;align-items:baseline;gap:2px;margin-bottom:3px">${cinLink}</div>
          <div style="display:flex;align-items:baseline;gap:2px">${coutLink}</div>
        </td>
      </tr>`;
    }).join("")}
  </table></div>`;
  } catch(e) { document.getElementById("wd-list").innerHTML=`<div class="empty">載入失敗：${e.message}</div>`; }
}

async function setDayVal(wdId, val, btn) {
  try {
    const row = document.getElementById("wr-"+wdId);
    const note = document.getElementById("note-"+wdId)?.value||null;
    await api("PATCH", `/api/admin/workdays/${wdId}`, {day_value:val, note});
    row.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active-full","active-half","active-none"));
    if (val===1.0) btn.classList.add("active-full");
    else if (val===0.5) btn.classList.add("active-half");
    else btn.classList.add("active-none");
    toast("✓ 出工日已更新");
  } catch(e) { toast(e.message || "更新失敗", "error"); }
}

async function saveClockTimes(wdId) {
  try {
    const cinVal  = document.getElementById("cin-"+wdId).value.trim();
    const coutVal = document.getElementById("cout-"+wdId).value.trim();
    if (!cinVal && !coutVal) { toast("請輸入上班或下班時間","error"); return; }
    const fmt = /^([01]\d|2[0-3]):[0-5]\d$/;
    if (cinVal  && !fmt.test(cinVal))  { toast("上班時間格式錯誤，請輸入 HH:MM（如 08:30）","error"); return; }
    if (coutVal && !fmt.test(coutVal)) { toast("下班時間格式錯誤，請輸入 HH:MM（如 17:00）","error"); return; }
    const body = {};
    if (cinVal)  body.clock_in_time  = cinVal;
    if (coutVal) body.clock_out_time = coutVal;
    await api("PATCH", `/api/admin/workdays/${wdId}`, body);
    const btn = document.getElementById("ctbtn-"+wdId);
    btn.classList.add("saved");
    setTimeout(()=>btn.classList.remove("saved"), 2500);
    toast("✓ 上下班時間已儲存");
  } catch(e) { toast(e.message || "儲存失敗", "error"); }
}

async function saveOt(wdId) {
  try {
  const hours = parseFloat(document.getElementById("ot-"+wdId).value)||0;
  await api("PATCH", `/api/admin/workdays/${wdId}`, {overtime_hours:hours});
  // 打勾變綠
  const btn = document.getElementById("otbtn-"+wdId);
  btn.classList.add("saved");
  btn.textContent = "✓";
  setTimeout(()=>btn.classList.remove("saved"), 2500);
  toast(hours>0 ? `✓ 加班 ${hours}h 已儲存` : "✓ 加班已清除");
  } catch(e) { toast(e.message || "儲存失敗", "error"); }
}

// ── 借支 ──
function buildEmpSelect(selId, withAll = false) {
  const el = document.getElementById(selId);
  if (!el) return;
  const allOpt = withAll ? '<option value="">無（全部）</option>' : '';
  el.innerHTML = allOpt + employees.map(e=>`<option value="${e.id}">${e.display_name}</option>`).join("");
}

async function addLoan() {
  try {
    const body = {
      employee_id: +document.getElementById("loan-emp").value,
      amount: +document.getElementById("loan-amount").value,
      note: document.getElementById("loan-note").value||null,
    };
    if (!body.amount) { toast("請填借支金額","error"); return; }
    const d = await api("POST","/api/admin/loans",body);
    toast(`✓ 已新增，累計借支 $${fmt(d.remaining_balance)}`);
    document.getElementById("loan-amount").value="";
    document.getElementById("loan-note").value="";
  } catch(e) { toast(e.message || "新增失敗", "error"); }
}

function renderLoanTable(rows, showName=false) {
  if (!rows.length) return '<div class="empty">尚無借支紀錄</div>';
  return `<table class="tbl">
    <tr>${showName?'<th>員工</th>':''}<th>日期</th><th>金額</th><th>累計餘額</th><th>備註</th></tr>
    ${rows.map(r=>`<tr>
      ${showName?`<td style="font-weight:600">${r.display_name}</td>`:''}
      <td style="font-family:var(--mono);font-size:12px">${r.loan_date}</td>
      <td style="color:${r.amount<0?'var(--green)':'var(--amber)'}">
        ${r.amount<0?'-':'+'} $${Math.abs(r.amount).toLocaleString()}</td>
      <td style="color:var(--red);font-weight:700">$${fmt(r.remaining_balance)}</td>
      <td style="color:var(--muted)">${r.note||"—"}</td>
    </tr>`).join("")}
  </table>`;
}

async function queryLoans() {
  try {
    const empId = document.getElementById("loan-query-emp").value;
    const d = await api("GET",`/api/admin/loans/${empId}`);
    document.getElementById("loan-list").innerHTML = renderLoanTable(d.loans||[]);
  } catch(e) { document.getElementById("loan-list").innerHTML=`<div class="empty">載入失敗：${e.message}</div>`; }
}
async function queryAllLoans() {
  try {
    const d = await api("GET","/api/admin/loans");
    document.getElementById("loan-list").innerHTML = renderLoanTable(d.loans||[], true);
  } catch(e) { document.getElementById("loan-list").innerHTML=`<div class="empty">載入失敗：${e.message}</div>`; }
}

// ── 薪資結算 ──
async function createSalaryPeriod() {
  try {
    const body = {
      employee_id:    +document.getElementById("sal-emp").value,
      period_label:    document.getElementById("sal-label").value,
      period_start:    document.getElementById("sal-start").value,
      period_end:      document.getElementById("sal-end").value,
      settlement_date: document.getElementById("sal-settle").value||null,
      loan_deduction: +document.getElementById("sal-loan-ded").value||0,
      note:            document.getElementById("sal-note").value||null,
    };
    if (!body.period_label||!body.period_start||!body.period_end) {
      toast("請填期別、開始日、結束日","error"); return;
    }
    const d = await api("POST","/api/admin/salary_periods",body);
    document.getElementById("sal-result").innerHTML =
      `<span style="color:var(--green)">✓ 已產生</span>　天數：<b>${d.total_days}</b>
       應領：<b>$${fmt(d.gross)}</b>
       <span style="color:var(--green);font-weight:700">實領：$${fmt(d.net)}</span>
       借支餘額：<span style="color:var(--red)">$${fmt(d.loan_remaining_after)}</span>`;
    toast("✓ 薪資結算單已產生");
  } catch(e) { toast(e.message || "產生失敗", "error"); }
}

async function querySalary() {
  const el = document.getElementById("sal-list");
  try {
    const empId  = document.getElementById("sal-query-emp").value;
    const label  = document.getElementById("sal-query-label").value.trim();
    const status = document.getElementById("sal-query-status").value;
    const params = new URLSearchParams();
    if (empId)  params.set("employee_id", empId);
    if (label)  params.set("period_label", label);
    if (status) params.set("status", status);
    const qs = params.toString() ? `?${params}` : "";
    const d = await api("GET", `/api/admin/salary_periods${qs}`);
    const rows = d.periods||[];
    if (!rows.length) { el.innerHTML='<div class="empty">尚無結算單</div>'; return; }

    el.innerHTML = `<div style="overflow-x:auto"><table class="tbl">
      <tr>
        <th>姓名</th><th>期別</th><th>結算日</th><th>日薪</th><th>天數</th>
        <th>加班費率</th><th>加班時數</th>
        <th>勞保</th><th>健保</th><th>稅金</th><th>仲介費</th>
        <th>借支扣款</th><th>借支餘額</th>
        <th>應領</th><th>實領</th>
        <th>備註</th><th>狀態</th><th>操作</th>
      </tr>
      ${rows.map(r=>`<tr id="sr-${r.id}">
        <td style="font-weight:600">${r.display_name}</td>
        <td style="font-family:var(--mono);font-size:12px">${r.period_label}</td>
        <td style="font-size:12px">${r.settlement_date||"—"}</td>
        <td>$${fmt(r.daily_rate_snapshot)}</td>
        <td>${r.total_days}</td>
        <td>$${fmt(r.overtime_rate_snapshot)}</td>
        <td>${r.total_overtime_hours}</td>
        <td>${fmt(r.labor_insurance)}</td>
        <td>${fmt(r.health_insurance)}</td>
        <td>${fmt(r.tax_snapshot||0)}</td>
        <td>${fmt(r.agency_fee_snapshot||0)}</td>
        <td style="color:var(--red)">${fmt(r.loan_deduction)}</td>
        <td style="color:var(--red)">${fmt(r.loan_remaining_after)}</td>
        <td style="font-weight:600">$${fmt(r.gross_salary)}</td>
        <td style="color:var(--green);font-weight:700">$${fmt(r.net_salary)}</td>
        <td>
          <input type="text" id="snote-${r.id}" value="${r.note||''}"
            style="width:100px;font-size:12px" placeholder="備註"
            onblur="saveSalNote(${r.id})"/>
        </td>
        <td><span class="badge ${r.status==='confirmed'?'badge-green':'badge-amber'}">
          ${r.status==='confirmed'?'已確認':'草稿'}</span></td>
        <td>
          <div style="display:flex;gap:4px">
            ${r.status==='draft'
              ?`<button class="btn btn-primary btn-sm" onclick="confirmSal(${r.id},'confirmed')">確認</button>`
              :`<button class="btn btn-ghost btn-sm" onclick="confirmSal(${r.id},'draft')">退回</button>`}
            <button class="btn btn-danger btn-sm" onclick="deleteSal(${r.id})">刪除</button>
          </div>
        </td>
      </tr>`).join("")}
    </table></div>`;
  } catch(e) { el.innerHTML=`<div class="empty">載入失敗：${e.message}</div>`; }
}

async function saveSalNote(id) {
  try {
    const note = document.getElementById("snote-"+id).value;
    await api("PATCH", `/api/admin/salary_periods/${id}`, {note});
    toast("✓ 備註已儲存");
  } catch(e) { toast(e.message || "儲存失敗", "error"); }
}

async function confirmSal(id, status) {
  try {
    await api("PATCH", `/api/admin/salary_periods/${id}`, {status});
    toast(status==="confirmed"?"✓ 已確認，員工可查看":"已退回草稿");
    querySalary();
  } catch(e) { toast(e.message || "操作失敗", "error"); }
}

async function deleteSal(id) {
  if (!confirm("確定要刪除這筆結算單？此操作無法復原。")) return;
  try {
    await api("DELETE", `/api/admin/salary_periods/${id}`);
    toast("✓ 結算單已刪除");
    querySalary();
  } catch(e) { toast(e.message || "刪除失敗", "error"); }
}

// ── 本期總計 ──
async function loadSummaryLabels() {
  try {
    const d = await api("GET", "/api/admin/summary_labels");
    const sel = document.getElementById("sum-label");
    const labels = d.labels||[];
    if (!labels.length) { sel.innerHTML='<option value="">尚無已確認期別</option>'; return; }
    sel.innerHTML = labels.map(l=>`<option value="${l}">${l}</option>`).join("");
    querySummary();
  } catch(e) { toast(e.message || "載入期別失敗", "error"); }
}

async function querySummary() {
  const el = document.getElementById("sum-list");
  try {
    const label = document.getElementById("sum-label").value;
    if (!label || label==="尚無已確認期別") return;
    const d = await api("GET", `/api/admin/summary?period_label=${encodeURIComponent(label)}`);
    const rows = d.periods||[];
    if (!rows.length) { el.innerHTML='<div class="empty">此期別尚無已確認結算單</div>'; return; }

    el.innerHTML = `<div style="overflow-x:auto"><table class="tbl">
      <tr>
        <th>姓名</th><th>結算日</th><th>日薪</th><th>天數</th>
        <th>加班費率</th><th>加班時數</th>
        <th>勞保</th><th>健保</th><th>稅金</th><th>仲介費</th>
        <th>借支扣款</th><th>借支餘額</th>
        <th>實領</th><th>備註</th>
      </tr>
      ${rows.map(r=>`<tr>
        <td style="font-weight:600">${r.display_name}</td>
        <td style="font-size:12px">${r.settlement_date||"—"}</td>
        <td>$${fmt(r.daily_rate_snapshot)}</td>
        <td>${r.total_days}</td>
        <td>$${fmt(r.overtime_rate_snapshot)}</td>
        <td>${r.total_overtime_hours}</td>
        <td>${fmt(r.labor_insurance)}</td>
        <td>${fmt(r.health_insurance)}</td>
        <td>${fmt(r.tax_snapshot||0)}</td>
        <td>${fmt(r.agency_fee_snapshot||0)}</td>
        <td style="color:var(--red)">${fmt(r.loan_deduction)}</td>
        <td style="color:var(--red)">${fmt(r.loan_remaining_after)}</td>
        <td style="color:var(--green);font-weight:700">$${fmt(r.net_salary)}</td>
        <td style="color:var(--muted);font-size:12px">${r.note||"—"}</td>
      </tr>`).join("")}
      <tr class="total-row">
        <td colspan="12" style="text-align:right;font-size:12px;color:var(--muted)">合計</td>
        <td style="color:var(--green)">$${fmt(d.total_net)}</td>
        <td></td>
      </tr>
    </table></div>`;
  } catch(e) { el.innerHTML=`<div class="empty">載入失敗：${e.message}</div>`; }
}
</script>
