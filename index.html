<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f3f4f8;
      margin: 0;
      padding: 24px;
      color: #222;
    }
    .card {
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    /* ── 語言切換 ── */
    .lang-switch {
      display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 18px;
    }
    .lang-btn {
      width: auto; margin: 0; padding: 6px 18px; font-size: 14px; font-weight: 600;
      border-radius: 20px; border: 2px solid #d0d0d0; background: #f3f4f8;
      color: #888; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active {
      background: #06c755; border-color: #06c755; color: #fff;
    }

    h1 { margin: 0 0 24px; font-size: 28px; font-weight: 800; }
    .info { line-height: 1.8; font-size: 16px; margin-bottom: 20px; word-break: break-word; }
    .info div { margin-bottom: 4px; }
    button {
      width: 100%; border: none; border-radius: 16px;
      padding: 16px; margin: 8px 0; font-size: 18px;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.90; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .clock-btns { display: flex; flex-direction: column; gap: 20px; margin: 4px 0 16px; }
    .clock-btns button { margin: 0; }
    .in  { background: #06c755; color: white; padding: 22px 16px; font-size: 22px; font-weight: 700; border-radius: 18px; }
    .out { background: #1f1f1f; color: white; padding: 22px 16px; font-size: 22px; font-weight: 700; border-radius: 18px; }
    .record { background: #e9edf3; color: #222; }
    .panel {
      margin-top: 20px; background: #f7f7f7; border-radius: 14px;
      padding: 16px; font-size: 14px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .success { background: #eefaf3; color: #146c36; }
    .error   { background: #fff1f1; color: #a12626; }
    .hint { font-size: 13px; color: #888; margin-top: 10px; }

    /* ── 紀錄面板 ── */
    #records-panel { display: none; margin-top: 20px; }
    .rec-tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .rec-tab {
      flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid #e0e0e0; color: #888; transition: all 0.2s;
    }
    .rec-tab.active { border-bottom-color: #06c755; color: #06c755; }

    .rec-section { display: none; }
    .rec-section.active { display: block; }

    .wd-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 4px; border-bottom: 1px solid #eee; font-size: 14px;
    }
    .wd-item:last-child { border-bottom: none; }
    .wd-date { font-weight: 600; color: #333; }
    .wd-times { color: #666; font-size: 12px; }
    .wd-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .wd-full { background: #eefaf3; color: #146c36; }
    .wd-half { background: #fff8e6; color: #9a6700; }
    .wd-pending { background: #f0f0f0; color: #888; }

    .sal-card {
      border: 1px solid #e0e0e0; border-radius: 14px; padding: 16px; margin-bottom: 12px;
    }
    .sal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .sal-period { font-weight: 700; font-size: 16px; }
    .sal-date { font-size: 12px; color: #888; }
    .sal-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
    .sal-row.total {
      border-top: 1px solid #e0e0e0; margin-top: 8px; padding-top: 10px;
      font-weight: 700; font-size: 16px; color: #06c755;
    }
    .sal-deduct { color: #e53935; }
    .empty-hint { text-align: center; color: #aaa; font-size: 14px; padding: 24px 0; }

    .loading-dots::after {
      content: ''; animation: dots 1.2s steps(3) infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }
  </style>
</head>
<body>
<div class="card">
  <!-- 語言切換 -->
  <div class="lang-switch">
    <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        id="btn-vi" onclick="setLang('vi')">Tiếng Việt</button>
  </div>

  <h1 id="title-h1">員工打卡系統</h1>
  <div class="info">
    <div><span data-i18n="labelName">姓名：</span><span id="name">—</span></div>
    <div><span data-i18n="labelTime">目前時間：</span><span id="frontendTime">—</span></div>
    <div><span data-i18n="labelLocation">目前定位：</span><span id="locationText"></span></div>
  </div>

  <div class="clock-btns">
    <button class="in"  id="clockInBtn"  data-i18n="btnClockIn">上班打卡</button>
    <button class="out" id="clockOutBtn" data-i18n="btnClockOut" disabled>下班打卡</button>
  </div>
  <button class="record" id="recordBtn" data-i18n="btnRecord">查看本期紀錄</button>

  <div class="panel" id="resultPanel"></div>
  <div class="hint" data-i18n="hint">正式打卡時間以後端伺服器時間為準</div>

  <!-- 紀錄面板 -->
  <div id="records-panel">
    <div class="rec-tabs">
      <div class="rec-tab active" onclick="switchRecTab('workdays')" data-i18n="tabWorkdays">出工日紀錄</div>
      <div class="rec-tab"        onclick="switchRecTab('salary')"   data-i18n="tabSalary">薪資明細</div>
    </div>
    <div id="rec-workdays" class="rec-section active">
      <div class="loading-dots" id="wd-loading" style="color:#888;font-size:14px;padding:16px 0" data-i18n="loading">載入中</div>
      <div id="wd-content"></div>
    </div>
    <div id="rec-salary" class="rec-section">
      <div class="loading-dots" id="sal-loading" style="color:#888;font-size:14px;padding:16px 0;display:none" data-i18n="loading">載入中</div>
      <div id="sal-content"></div>
    </div>
  </div>
</div>

<script>
  // ── 翻譯表 ──────────────────────────────────────────────────────
  const LANG_TEXT = {

      btnRecord:       '查看本期紀錄',
      btnRecordClose:  '收起紀錄',
      panelDefault:    '尚未操作',
      hint:            '正式打卡時間以後端伺服器時間為準',

      tabSalary:       '薪資明細',
      loading:         '載入中',

      opFail:          '操作失敗：',
      geoNoSupport:    '不支援定位',
      geoDenied:       '使用者拒絕定位',
      geoUnavailable:  '無法取得定位',

      geoNotReady:         '⚠️ 尚未取得定位，無法打卡。\n請等畫面上方定位顯示成功後再試。',
      geoDeniedPermanent:  '⚠️ 定位已被封鎖，無法打卡。\n\n請依照以下步驟開啟定位權限後，重新整理頁面：\n\n📱 Android\n手機設定 → 應用程式 → LINE → 權限 → 位置\n\n🍎 iOS\n設定 → LINE → 位置 → 選「使用 App 期間」',
      noWorkdays:      '尚無出工紀錄',
      loadFail:        '載入失敗：',

      timeOut:         '下班',
      badgeFull:       '整天',
      badgeHalf:       '半天',
      badgeZero:       '0天',
      badgePending:    '待確認',
      noSalary:        '尚無已確認的薪資明細',
      salaryNote:      '管理員確認結算後才會顯示',
      settleDate:      '結算日：',

      dayUnit:         '天',
      overtime:        '加班',
      grossSubtotal:   '應領小計',
      laborIns:        '勞保',
      healthIns:       '健保',
      tax:             '稅金',
      agencyFee:       '仲介費',
      loanDeduct:      '借支扣款',
      loanBalance:     '借支餘額',
      noteLabel:       '備註',
      netSalary:       '實領薪資',
      initSuccess:     'LIFF 初始化成功，已讀到使用者資料',
      initFail:        '初始化失敗：',
    },
    vi: {
      pageTitle:       'Hệ thống chấm công',
      h1:              'Hệ thống chấm công',
      labelName:       'Họ tên：',
      labelTime:       'Thời gian hiện tại：',
      labelLocation:   'Vị trí hiện tại：',
      locationDefault: 'Chưa xác định được vị trí',
      btnClockIn:      'Chấm công vào ca',
      btnClockOut:     'Chấm công ra ca',
      todayDone:       'Hôm nay đã chấm công xong ✓',
      btnRecord:       'Xem lịch sử kỳ này',
      btnRecordClose:  'Thu gọn',
      panelDefault:    'Chưa thao tác',
      hint:            'Thời gian chấm công chính thức tính theo giờ máy chủ',
      tabWorkdays:     'Ngày công',
      tabSalary:       'Chi tiết lương',
      loading:         'Đang tải',
      noProfile:       'Chưa lấy được dữ liệu LINE',
      clocking:        'Đang gửi chấm công...',
      idTokenFail:     'Lấy idToken thất bại, vui lòng mở lại',
      serverFail:      'Máy chủ trả lỗi',
      clockInDone:     'Chấm công vào ca thành công',
      clockOutDone:    'Chấm công ra ca thành công',
      panelName:       'Họ tên',
      panelTime:       'Thời gian',
      panelLoc:        'Vị trí',
      opFail:          'Thao tác thất bại：',
      geoNoSupport:    'Không hỗ trợ định vị',
      geoDenied:       'Người dùng từ chối định vị',
      geoUnavailable:  'Không thể lấy vị trí',
      geoTimeout:      'Hết thời gian định vị',
      geoFail:         'Lấy vị trí thất bại',
      locationFetching:    'Đang xác định vị trí...',
      geoDeniedShort:      'Vị trí bị chặn',
      geoNotReady:         '⚠️ Chưa xác định được vị trí, không thể chấm công.\nVui lòng chờ vị trí hiển thị thành công rồi thử lại.',
      geoDeniedPermanent:  '⚠️ Quyền định vị bị chặn, không thể chấm công.\n\nVui lòng mở quyền định vị rồi tải lại trang:\n\n📱 Android\nCài đặt → Ứng dụng → LINE → Quyền → Vị trí\n\n🍎 iOS\nCài đặt → LINE → Vị trí → Chọn "Khi sử dụng App"',
      noWorkdays:      'Chưa có hồ sơ ngày công',
      loadFail:        'Tải thất bại：',
      timeIn:          'Giờ vào',
      timeOut:         'Giờ ra',
      badgeFull:       'Nguyên ngày',
      badgeHalf:       'Nửa ngày',
      badgeZero:       'Không tính',
      badgePending:    'Chờ xác nhận',
      noSalary:        'Chưa có chi tiết lương đã xác nhận',
      salaryNote:      'Sẽ hiển thị sau khi quản lý xác nhận',
      settleDate:      'Ngày quyết toán：',
      dailyRate:       'Lương ngày',
      workDays:        'Số ngày công',
      dayUnit:         'ngày',
      overtime:        'Tăng ca',
      grossSubtotal:   'Tổng lương gộp',
      laborIns:        'BHXH',
      healthIns:       'BHYT',
      tax:             'Thuế',
      agencyFee:       'Phí môi giới',
      loanDeduct:      'Khấu trừ tạm ứng',
      loanBalance:     'Số dư tạm ứng',
      noteLabel:       'Ghi chú',
      netSalary:       'Lương thực nhận',
      initSuccess:     'Khởi tạo thành công, đã đọc dữ liệu người dùng',
      initFail:        'Khởi tạo thất bại：',
    }
  };

  let lang = localStorage.getItem('lang') || 'zh';
  let T = LANG_TEXT[lang];
  let panelUsed = false;

  function setLang(l) {
    lang = l;
    T = LANG_TEXT[l];
    localStorage.setItem('lang', l);

    // 切換按鈕樣式
    document.getElementById('btn-zh').classList.toggle('active', l === 'zh');
    document.getElementById('btn-vi').classList.toggle('active', l === 'vi');

    // 更新頁面標題
    document.title = T.pageTitle;
    document.getElementById('title-h1').textContent = T.h1;

    // 更新所有 data-i18n 元素
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = T[el.dataset.i18n] || '';
    });

    // 更新定位文字（根據目前狀態）
    const locEl = document.getElementById('locationText');
    if (!locEl.dataset.hasLocation) {
      if (locationState === 'fetching') locEl.textContent = T.locationFetching;
      else if (locationState === 'denied') locEl.textContent = T.geoDeniedShort;
      else locEl.textContent = T.locationDefault;
    } else if (locationState === 'ready' && locationCache) {
      // 定位已就緒 → 用新語言重新取地址
      reverseGeocode(locationCache.latitude, locationCache.longitude).then(addr => {
        if (locationState === 'ready') {
          locationCache.addressText = addr;
          locEl.textContent = addr
            ? `${addr}（±${Math.round(locationCache.accuracy)}m）`
            : `${locationCache.latitude.toFixed(6)}, ${locationCache.longitude.toFixed(6)}（±${Math.round(locationCache.accuracy)}m）`;
        }
      });
    }

    // 更新 resultPanel
    if (!panelUsed) {
      setPanel(T.panelDefault);
    } else if (panelState) {
      const d = panelState.data;
      if (panelState.key === 'clockSuccess') {
        const actionText = d.action === 'clock_in' ? T.clockInDone : T.clockOutDone;
        setPanel(`${actionText}\n\n${T.panelName}：${d.displayName}\n${T.panelTime}：${d.time}\n${T.panelLoc}：${d.locationText}`, 'success');
      } else if (panelState.key === 'geoDenied') {
        setPanel(T.geoDeniedPermanent, 'error');
      } else if (panelState.key === 'geoNotReady') {
        setPanel(T.geoNotReady, 'error');
      } else if (panelState.key === 'todayDone') {
        setPanel(T.todayDone, 'success');
      }
    }

    // 更新 recordBtn（根據面板開/關狀態）
    const rBtn = document.getElementById('recordBtn');
    const rPanel = document.getElementById('records-panel');
    rBtn.textContent = rPanel.style.display === 'block' ? T.btnRecordClose : T.btnRecord;

    // 重新渲染已載入的動態內容
    if (recordsLoaded.workdays) { recordsLoaded.workdays = false; loadWorkdays(); }
    if (recordsLoaded.salary)   { recordsLoaded.salary   = false; loadSalary();   }
  }

  // ── 初始化常數 ──────────────────────────────────────────────────
  const LIFF_ID      = "2009557141-tTweS0in";
  const API_BASE_URL = "https://attendance-backend-g8k9.onrender.com";

  let currentProfile = null;
  let recordsLoaded  = { workdays: false, salary: false };
  let locationState  = 'idle';   // 'idle' | 'fetching' | 'ready' | 'denied' | 'error'
  let locationCache  = null;     // { latitude, longitude, accuracy, addressText }
  let panelState     = null;     // { key, data? } — 供切換語言時重新渲染 panel

  // ── 當日打卡狀態 (localStorage) ──────────────────────────────────
  let clockState = { clockedIn: false, clockedOut: false };

  function todayKey() {
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function loadClockState() {
    try {
      const s = JSON.parse(localStorage.getItem('clockState') || '{}');
      if (s.date === todayKey()) {
        clockState = { clockedIn: !!s.clockedIn, clockedOut: !!s.clockedOut };
      } else {
        clockState = { clockedIn: false, clockedOut: false };
      }
    } catch { clockState = { clockedIn: false, clockedOut: false }; }
  }
  function saveClockState() {
    localStorage.setItem('clockState', JSON.stringify({ date: todayKey(), ...clockState }));
  }
  function applyClockState() {
    if (clockState.clockedOut) {
      clockInBtn.disabled  = true;
      clockOutBtn.disabled = true;
      panelUsed = true;
      panelState = { key: 'todayDone' };
      setPanel(T.todayDone, 'success');
    } else if (clockState.clockedIn) {
      clockInBtn.disabled  = true;
      clockOutBtn.disabled = false;
    } else {
      clockInBtn.disabled  = false;
      clockOutBtn.disabled = true;
    }
  }

  // 每 60 秒檢查日期，跨午夜自動刷新頁面（清掉狀態）
  let _todayKey = todayKey();
  setInterval(() => {
    if (todayKey() !== _todayKey) location.reload();
  }, 60000);

  const nameEl         = document.getElementById("name");
  const frontendTimeEl = document.getElementById("frontendTime");
  const locationTextEl = document.getElementById("locationText");
  const resultPanel    = document.getElementById("resultPanel");
  const clockInBtn     = document.getElementById("clockInBtn");
  const clockOutBtn    = document.getElementById("clockOutBtn");
  const recordBtn      = document.getElementById("recordBtn");
  const recordsPanel   = document.getElementById("records-panel");

  // 套用初始語言
  setLang(lang);
  setInterval(() => { frontendTimeEl.textContent = formatLocalTime(new Date()); }, 1000);

  function setPanel(msg, type="") {
    resultPanel.textContent = msg;
    resultPanel.className = "panel" + (type ? " "+type : "");
  }
  function formatLocalTime(d=new Date()) {
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }
  function p(n) { return String(n).padStart(2,"0"); }
  function setDisabled(v) { clockInBtn.disabled=v; clockOutBtn.disabled=v; recordBtn.disabled=v; }

  async function initLocation() {
    locationCache = null;
    locationTextEl.dataset.hasLocation = "";

    if (!navigator.geolocation) {
      locationState = 'error';
      locationTextEl.textContent = T.geoNoSupport;
      return;
    }
    if (navigator.permissions) {
      try {
        const perm = await navigator.permissions.query({ name: 'geolocation' });
        if (perm.state === 'denied') {
          locationState = 'denied';
          locationTextEl.textContent = T.geoDeniedShort;
          return;
        }
      } catch {}
    }
    locationState = 'fetching';
    locationTextEl.textContent = T.locationFetching;
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej,
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 })
      );
      const { latitude, longitude, accuracy } = pos.coords;
      const addressText = await reverseGeocode(latitude, longitude);
      locationCache = { latitude, longitude, accuracy, addressText };
      locationState = 'ready';
      locationTextEl.dataset.hasLocation = "1";
      locationTextEl.textContent = addressText
        ? `${addressText}（±${Math.round(accuracy)}m）`
        : `${latitude.toFixed(6)}, ${longitude.toFixed(6)}（±${Math.round(accuracy)}m）`;
    } catch(err) {
      locationCache = null;
      locationTextEl.dataset.hasLocation = "";
      if (err.code === 1) {
        locationState = 'denied';
        locationTextEl.textContent = T.geoDeniedShort;
      } else {
        locationState = 'error';
        locationTextEl.textContent = T.locationDefault;
      }
    }
  }

  async function reverseGeocode(lat, lon) {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 5000);
      const r = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=zh-TW,zh`,
        { signal: controller.signal }
      );
      clearTimeout(tid);
      if (!r.ok) return null;
      const d = await r.json();
      const a = d.address || {};
      const parts = [
        a.city || a.county,
        a.district || a.suburb,
        a.road,
        a.house_number
      ].filter(Boolean);
      return parts.length ? parts.join('') : (d.display_name || null);
    } catch {
      return null;
    }
  }

  async function sendClockRequest(type) {
    if (!currentProfile) { setPanel(T.noProfile, "error"); return; }
    panelUsed = true;

    // 定位未就緒 → 給指引，不送出打卡
    if (locationState !== 'ready') {
      if (locationState === 'denied') {
        panelState = { key: 'geoDenied' };
        setPanel(T.geoDeniedPermanent, "error");
      } else {
        panelState = { key: 'geoNotReady' };
        setPanel(T.geoNotReady, "error");
      }
      return;
    }

    try {
      clockInBtn.disabled = true;
      clockOutBtn.disabled = true;
      recordBtn.disabled = true;
      setPanel(T.clocking);
      const idToken = liff.getIDToken();
      if (!idToken) throw new Error(T.idTokenFail);
      const { latitude, longitude, accuracy, addressText } = locationCache;
      const payload = {
        action: type, idToken,
        lineUserId: currentProfile.userId,
        displayName: currentProfile.displayName,
        frontendTime: formatLocalTime(new Date()),
        address_text: addressText,
        latitude, longitude, accuracy
      };
      const r = await fetch(`${API_BASE_URL}/api/clock`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)
      });
      const result = await r.json();
      if (!r.ok) throw new Error(result.detail || T.serverFail);

      if (type === "clock_in") { clockState.clockedIn = true; }
      else                     { clockState.clockedOut = true; }
      saveClockState();

      const actionText = type === "clock_in" ? T.clockInDone : T.clockOutDone;
      panelState = { key: 'clockSuccess', data: { action: type, displayName: result.displayName, time: result.time, locationText: result.locationText } };
      setPanel(
        `${actionText}\n\n${T.panelName}：${result.displayName}\n${T.panelTime}：${result.time}\n${T.panelLoc}：${result.locationText}`,
        "success"
      );
      recordsLoaded.workdays = false;
    } catch(e) {
      setPanel(T.opFail + e.message, "error");
    } finally {
      recordBtn.disabled = false;
      applyClockState();
    }
  }

  // ── 查看紀錄 ──
  function switchRecTab(name) {
    document.querySelectorAll(".rec-tab").forEach((el,i) =>
      el.classList.toggle("active", ["workdays","salary"][i]===name)
    );
    document.querySelectorAll(".rec-section").forEach((el,i) =>
      el.classList.toggle("active", ["workdays","salary"][i]===name)
    );
    if (name==="salary" && !recordsLoaded.salary) loadSalary();
  }

  async function handleRecordClick() {
    if (recordsPanel.style.display === "block") {
      recordsPanel.style.display = "none";
      recordBtn.textContent = T.btnRecord;
      return;
    }
    recordsPanel.style.display = "block";
    recordBtn.textContent = T.btnRecordClose;
    if (!recordsLoaded.workdays) loadWorkdays();
  }

  async function loadWorkdays() {
    const el = document.getElementById("wd-content");
    document.getElementById("wd-loading").style.display = "block";
    el.innerHTML = "";
    try {
      const idToken = liff.getIDToken();
      const r = await fetch(`${API_BASE_URL}/api/my/workdays`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({idToken})
      });
      const d = await r.json();
      const rows = d.records || [];
      document.getElementById("wd-loading").style.display = "none";
      if (!rows.length) { el.innerHTML=`<div class="empty-hint">${T.noWorkdays}</div>`; return; }

      el.innerHTML = rows.map(row => {
        const cin  = row.clock_in_time  ? (d=>{return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`})(new Date(row.clock_in_time))  : "—";
        const cout = row.clock_out_time ? (d=>{return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`})(new Date(row.clock_out_time)) : "—";
        const dv = row.day_value;
        const badge = dv==1   ? `<span class="wd-badge wd-full">${T.badgeFull}</span>`
                    : dv==0.5 ? `<span class="wd-badge wd-half">${T.badgeHalf}</span>`
                    : dv===0  ? `<span class="wd-badge wd-pending">${T.badgeZero}</span>`
                    :           `<span class="wd-badge wd-pending">${T.badgePending}</span>`;
        return `<div class="wd-item">
          <div>
            <div class="wd-date">${row.work_date}</div>
            <div class="wd-times">${T.timeIn} ${cin}　${T.timeOut} ${cout}</div>
          </div>
          ${badge}
        </div>`;
      }).join("");
      recordsLoaded.workdays = true;
    } catch(e) {
      document.getElementById("wd-loading").style.display = "none";
      el.innerHTML = `<div class="empty-hint">${T.loadFail}${e.message}</div>`;
    }
  }

  async function loadSalary() {
    const el = document.getElementById("sal-content");
    document.getElementById("sal-loading").style.display = "block";
    el.innerHTML = "";
    try {
      const idToken = liff.getIDToken();
      const r = await fetch(`${API_BASE_URL}/api/my/salary`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({idToken})
      });
      const d = await r.json();
      const rows = d.records || [];
      document.getElementById("sal-loading").style.display = "none";
      if (!rows.length) { el.innerHTML=`<div class="empty-hint">${T.noSalary}<br><small>${T.salaryNote}</small></div>`; return; }

      el.innerHTML = rows.map(row => `
        <div class="sal-card">
          <div class="sal-header">
            <span class="sal-period">${row.period_label}</span>
            <span class="sal-date">${T.settleDate}${row.settlement_date||"—"}</span>
          </div>
          <div class="sal-row"><span>${T.dailyRate}</span><span>$${row.daily_rate_snapshot?.toLocaleString()}</span></div>
          <div class="sal-row"><span>${T.workDays}</span><span>${row.total_days} ${T.dayUnit}</span></div>
          ${row.total_overtime_hours>0 ? `<div class="sal-row"><span>${T.overtime}（${row.total_overtime_hours}h × $${row.overtime_rate_snapshot}）</span><span>$${(row.overtime_amount||0).toLocaleString()}</span></div>` : ""}
          <div class="sal-row" style="border-top:1px solid #e0e0e0;margin-top:6px;padding-top:8px;font-weight:600"><span>${T.grossSubtotal}</span><span>$${row.gross_salary?.toLocaleString()}</span></div>
          ${row.labor_insurance>0 ? `<div class="sal-row"><span>${T.laborIns}</span><span class="sal-deduct">-$${row.labor_insurance.toLocaleString()}</span></div>` : ""}
          ${row.health_insurance>0 ? `<div class="sal-row"><span>${T.healthIns}</span><span class="sal-deduct">-$${row.health_insurance.toLocaleString()}</span></div>` : ""}
          ${(row.tax_snapshot||0)>0 ? `<div class="sal-row"><span>${T.tax}</span><span class="sal-deduct">-$${row.tax_snapshot.toLocaleString()}</span></div>` : ""}
          ${(row.agency_fee_snapshot||0)>0 ? `<div class="sal-row"><span>${T.agencyFee}</span><span class="sal-deduct">-$${row.agency_fee_snapshot.toLocaleString()}</span></div>` : ""}
          ${row.loan_deduction>0 ? `<div class="sal-row"><span>${T.loanDeduct}</span><span class="sal-deduct">-$${row.loan_deduction.toLocaleString()}</span></div>` : ""}
          ${row.loan_deduction>0 ? `<div class="sal-row"><span>${T.loanBalance}</span><span style="color:#e53935">$${(row.loan_remaining_after||0).toLocaleString()}</span></div>` : ""}
          ${row.note ? `<div class="sal-row"><span>${T.noteLabel}</span><span style="color:#888">${row.note}</span></div>` : ""}
          <div class="sal-row total"><span>${T.netSalary}</span><span>$${row.net_salary?.toLocaleString()}</span></div>
        </div>
      `).join("");
      recordsLoaded.salary = true;
    } catch(e) {
      document.getElementById("sal-loading").style.display = "none";
      el.innerHTML = `<div class="empty-hint">${T.loadFail}${e.message}</div>`;
    }
  }

  // ── INIT ──
  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      currentProfile = await liff.getProfile();
      nameEl.textContent = currentProfile.displayName;
      clockInBtn.onclick  = () => sendClockRequest("clock_in");
      clockOutBtn.onclick = () => sendClockRequest("clock_out");
      recordBtn.onclick   = handleRecordClick;
      loadClockState();
      applyClockState();
      initLocation();
    } catch(e) {
      panelUsed = true;
      setPanel(T.initFail + e.message, "error");
    }
  }
  main();
</script>
</body>
</html>
