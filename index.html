<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, "Noto Sans TC", sans-serif;
      background: #f3f4f8;
      margin: 0;
      padding: 24px;
      color: #222;
    }
    .card {
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { margin: 0 0 24px; font-size: 28px; font-weight: 800; }
    .info { line-height: 1.8; font-size: 16px; margin-bottom: 20px; word-break: break-word; }
    .info div { margin-bottom: 4px; }
    button {
      width: 100%; border: none; border-radius: 16px;
      padding: 16px; margin: 8px 0; font-size: 18px;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.90; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .in  { background: #06c755; color: white; }
    .out { background: #1f1f1f; color: white; }
    .record { background: #e9edf3; color: #222; }
    .panel {
      margin-top: 20px; background: #f7f7f7; border-radius: 14px;
      padding: 16px; font-size: 14px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .success { background: #eefaf3; color: #146c36; }
    .error   { background: #fff1f1; color: #a12626; }
    .hint { font-size: 13px; color: #888; margin-top: 10px; }

    /* ── 紀錄面板 ── */
    #records-panel { display: none; margin-top: 20px; }
    .rec-tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .rec-tab {
      flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid #e0e0e0; color: #888; transition: all 0.2s;
    }
    .rec-tab.active { border-bottom-color: #06c755; color: #06c755; }

    .rec-section { display: none; }
    .rec-section.active { display: block; }

    .wd-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 4px; border-bottom: 1px solid #eee; font-size: 14px;
    }
    .wd-item:last-child { border-bottom: none; }
    .wd-date { font-weight: 600; color: #333; }
    .wd-times { color: #666; font-size: 12px; }
    .wd-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .wd-full { background: #eefaf3; color: #146c36; }
    .wd-half { background: #fff8e6; color: #9a6700; }
    .wd-pending { background: #f0f0f0; color: #888; }

    .sal-card {
      border: 1px solid #e0e0e0; border-radius: 14px; padding: 16px; margin-bottom: 12px;
    }
    .sal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .sal-period { font-weight: 700; font-size: 16px; }
    .sal-date { font-size: 12px; color: #888; }
    .sal-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
    .sal-row.total {
      border-top: 1px solid #e0e0e0; margin-top: 8px; padding-top: 10px;
      font-weight: 700; font-size: 16px; color: #06c755;
    }
    .sal-deduct { color: #e53935; }
    .empty-hint { text-align: center; color: #aaa; font-size: 14px; padding: 24px 0; }

    .loading-dots::after {
      content: ''; animation: dots 1.2s steps(3) infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>員工打卡系統</h1>
  <div class="info">
    <div>姓名：<span id="name">讀取中...</span></div>
    <div>LINE User ID：<span id="userId">讀取中...</span></div>
    <div>目前時間：<span id="frontendTime">—</span></div>
    <div>目前定位：<span id="locationText">尚未取得</span></div>
  </div>

  <button class="in"  id="clockInBtn">上班打卡</button>
  <button class="out" id="clockOutBtn">下班打卡</button>
  <button class="record" id="recordBtn">查看本期紀錄</button>

  <div class="panel" id="resultPanel">尚未操作</div>
  <div class="hint">正式打卡時間以後端伺服器時間為準</div>

  <!-- 紀錄面板 -->
  <div id="records-panel">
    <div class="rec-tabs">
      <div class="rec-tab active" onclick="switchRecTab('workdays')">出工日紀錄</div>
      <div class="rec-tab" onclick="switchRecTab('salary')">薪資明細</div>
    </div>
    <div id="rec-workdays" class="rec-section active">
      <div class="loading-dots" id="wd-loading" style="color:#888;font-size:14px;padding:16px 0">載入中</div>
      <div id="wd-content"></div>
    </div>
    <div id="rec-salary" class="rec-section">
      <div class="loading-dots" id="sal-loading" style="color:#888;font-size:14px;padding:16px 0;display:none">載入中</div>
      <div id="sal-content"></div>
    </div>
  </div>
</div>

<script>
  const LIFF_ID     = "2009557141-tTweS0in";
  const API_BASE_URL = "https://attendance-backend-g8k9.onrender.com";

  let currentProfile = null;
  let recordsLoaded  = { workdays: false, salary: false };

  const nameEl       = document.getElementById("name");
  const userIdEl     = document.getElementById("userId");
  const frontendTimeEl = document.getElementById("frontendTime");
  const locationTextEl = document.getElementById("locationText");
  const resultPanel  = document.getElementById("resultPanel");
  const clockInBtn   = document.getElementById("clockInBtn");
  const clockOutBtn  = document.getElementById("clockOutBtn");
  const recordBtn    = document.getElementById("recordBtn");
  const recordsPanel = document.getElementById("records-panel");

  setInterval(() => { frontendTimeEl.textContent = formatLocalTime(new Date()); }, 1000);

  function setPanel(msg, type="") {
    resultPanel.textContent = msg;
    resultPanel.className = "panel" + (type ? " "+type : "");
  }
  function formatLocalTime(d=new Date()) {
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }
  function p(n) { return String(n).padStart(2,"0"); }
  function setDisabled(v) { clockInBtn.disabled=v; clockOutBtn.disabled=v; recordBtn.disabled=v; }

  function getCurrentLocation() {
    return new Promise((res,rej) => {
      if (!navigator.geolocation) { rej(new Error("不支援定位")); return; }
      navigator.geolocation.getCurrentPosition(
        pos => {
          const {latitude,longitude,accuracy} = pos.coords;
          locationTextEl.textContent = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}（±${Math.round(accuracy)}m）`;
          res({latitude,longitude,accuracy});
        },
        err => {
          const msgs = {1:"使用者拒絕定位",2:"無法取得定位",3:"定位逾時"};
          rej(new Error(msgs[err.code]||"定位失敗"));
        },
        {enableHighAccuracy:true, timeout:10000, maximumAge:0}
      );
    });
  }

  async function sendClockRequest(type) {
    if (!currentProfile) { setPanel("尚未取得 LINE 資料","error"); return; }
    try {
      setDisabled(true);
      setPanel("正在取得定位與送出打卡...");
      const idToken = liff.getIDToken();
      if (!idToken) throw new Error("取得 idToken 失敗，請重新開啟");
      const loc = await getCurrentLocation();
      const payload = {
        action: type, idToken,
        lineUserId: currentProfile.userId,
        displayName: currentProfile.displayName,
        frontendTime: formatLocalTime(new Date()),
        ...loc
      };
      const r = await fetch(`${API_BASE_URL}/api/clock`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)
      });
      const result = await r.json();
      if (!r.ok) throw new Error(result.detail || "後端回傳失敗");

      setPanel(
        `${result.message}\n\n姓名：${result.displayName}\n時間：${result.time}\n位置：${result.locationText}`,
        "success"
      );
      // 重新載入出工日
      recordsLoaded.workdays = false;
    } catch(e) {
      setPanel("操作失敗："+e.message, "error");
    } finally {
      setDisabled(false);
    }
  }

  // ── 查看紀錄 ──
  function switchRecTab(name) {
    document.querySelectorAll(".rec-tab").forEach((el,i) =>
      el.classList.toggle("active", ["workdays","salary"][i]===name)
    );
    document.querySelectorAll(".rec-section").forEach((el,i) =>
      el.classList.toggle("active", ["workdays","salary"][i]===name)
    );
    if (name==="salary" && !recordsLoaded.salary) loadSalary();
  }

  async function handleRecordClick() {
    if (recordsPanel.style.display === "block") {
      recordsPanel.style.display = "none";
      recordBtn.textContent = "查看本期紀錄";
      return;
    }
    recordsPanel.style.display = "block";
    recordBtn.textContent = "收起紀錄";
    if (!recordsLoaded.workdays) loadWorkdays();
  }

  async function loadWorkdays() {
    const el = document.getElementById("wd-content");
    document.getElementById("wd-loading").style.display = "block";
    el.innerHTML = "";
    try {
      const idToken = liff.getIDToken();
      const r = await fetch(`${API_BASE_URL}/api/my/workdays`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({idToken})
      });
      const d = await r.json();
      const rows = d.records || [];
      document.getElementById("wd-loading").style.display = "none";
      if (!rows.length) { el.innerHTML='<div class="empty-hint">尚無出工紀錄</div>'; return; }

      el.innerHTML = rows.map(row => {
        const cin  = row.clock_in_time  ? new Date(row.clock_in_time).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : "—";
        const cout = row.clock_out_time ? new Date(row.clock_out_time).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : "—";
        const dv = row.day_value;
        const badge = dv==1   ? '<span class="wd-badge wd-full">整天</span>'
                    : dv==0.5 ? '<span class="wd-badge wd-half">半天</span>'
                    : '<span class="wd-badge wd-pending">待確認</span>';
        return `<div class="wd-item">
          <div>
            <div class="wd-date">${row.work_date}</div>
            <div class="wd-times">上班 ${cin}　下班 ${cout}</div>
          </div>
          ${badge}
        </div>`;
      }).join("");
      recordsLoaded.workdays = true;
    } catch(e) {
      document.getElementById("wd-loading").style.display = "none";
      el.innerHTML = `<div class="empty-hint">載入失敗：${e.message}</div>`;
    }
  }

  async function loadSalary() {
    const el = document.getElementById("sal-content");
    document.getElementById("sal-loading").style.display = "block";
    el.innerHTML = "";
    try {
      const idToken = liff.getIDToken();
      const r = await fetch(`${API_BASE_URL}/api/my/salary`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({idToken})
      });
      const d = await r.json();
      const rows = d.records || [];
      document.getElementById("sal-loading").style.display = "none";
      if (!rows.length) { el.innerHTML='<div class="empty-hint">尚無已確認的薪資明細<br><small>管理員確認結算後才會顯示</small></div>'; return; }

      el.innerHTML = rows.map(row => `
        <div class="sal-card">
          <div class="sal-header">
            <span class="sal-period">${row.period_label}</span>
            <span class="sal-date">結算日：${row.settlement_date||"—"}</span>
          </div>
          <div class="sal-row"><span>日薪</span><span>$${row.daily_rate_snapshot?.toLocaleString()}</span></div>
          <div class="sal-row"><span>出工天數</span><span>${row.total_days} 天</span></div>
          ${row.total_overtime_hours>0 ? `<div class="sal-row"><span>加班（${row.total_overtime_hours}h × $${row.overtime_rate_snapshot}）</span><span>$${(row.overtime_amount||0).toLocaleString()}</span></div>` : ""}
          <div class="sal-row" style="border-top:1px solid #e0e0e0;margin-top:6px;padding-top:8px;font-weight:600"><span>應領小計</span><span>$${row.gross_salary?.toLocaleString()}</span></div>
          ${row.labor_insurance>0 ? `<div class="sal-row"><span>勞保</span><span class="sal-deduct">-$${row.labor_insurance.toLocaleString()}</span></div>` : ""}
          ${row.health_insurance>0 ? `<div class="sal-row"><span>健保</span><span class="sal-deduct">-$${row.health_insurance.toLocaleString()}</span></div>` : ""}
          ${(row.tax_snapshot||0)>0 ? `<div class="sal-row"><span>稅金</span><span class="sal-deduct">-$${row.tax_snapshot.toLocaleString()}</span></div>` : ""}
          ${(row.agency_fee_snapshot||0)>0 ? `<div class="sal-row"><span>仲介費</span><span class="sal-deduct">-$${row.agency_fee_snapshot.toLocaleString()}</span></div>` : ""}
          ${row.loan_deduction>0 ? `<div class="sal-row"><span>借支扣款</span><span class="sal-deduct">-$${row.loan_deduction.toLocaleString()}</span></div>` : ""}
          ${row.loan_deduction>0 ? `<div class="sal-row"><span>借支餘額</span><span style="color:#e53935">$${(row.loan_remaining_after||0).toLocaleString()}</span></div>` : ""}
          ${row.note ? `<div class="sal-row"><span>備註</span><span style="color:#888">${row.note}</span></div>` : ""}
          <div class="sal-row total"><span>實領薪資</span><span>$${row.net_salary?.toLocaleString()}</span></div>
        </div>
      `).join("");
      recordsLoaded.salary = true;
    } catch(e) {
      document.getElementById("sal-loading").style.display = "none";
      el.innerHTML = `<div class="empty-hint">載入失敗：${e.message}</div>`;
    }
  }

  // ── INIT ──
  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      currentProfile = await liff.getProfile();
      nameEl.textContent   = currentProfile.displayName;
      userIdEl.textContent = currentProfile.userId;
      setPanel("LIFF 初始化成功，已讀到使用者資料");
      clockInBtn.onclick  = () => sendClockRequest("clock_in");
      clockOutBtn.onclick = () => sendClockRequest("clock_out");
      recordBtn.onclick   = handleRecordClick;
    } catch(e) {
      setPanel("初始化失敗："+e.message, "error");
    }
  }
  main();
</script>
</body>
</html>
